<svg width="300" height="44" viewBox="0 0 300 44" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Athena Chronicles logo</title>
<desc>Logo for Athena Chronicles: an orbiting cloud icon in neon blue and purple next to the wordmark Athena Chronicles, transparent background.</desc>

<defs>
  <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="0.8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <path id="orbitPath" d="M 30 9.3 A 16 12 0 1 1 -2.3 9.3 A 16 12 0 1 1 30 9.3" fill="none"/>
</defs>

<g transform="translate(16,10)" filter="url(#glow4)">
  <path d="M8.1 18.6 C3.9 18.6 0.9 15.6 0.9 12 C0.9 8.7 3.3 6.3 6.3 5.7 C6.9 2.4 9.9 0 13.8 0 C17.4 0 20.4 2.1 21.3 5.4 C24.6 5.4 27.3 8.1 27.3 11.4 C27.3 15.3 24 18.6 19.8 18.6 Z"
        fill="rgba(10,10,25,0.75)" stroke="#00f0ff" stroke-width="1.3"/>

  <g>
    <path d="M-6.8 4.65 C-8.9 4.65 -10.4 3.15 -10.4 1.35 C-10.4 -0.3 -9.2 -1.5 -7.7 -1.8 C-7.4 -3.45 -5.9 -4.65 -3.95 -4.65 C-2.15 -4.65 -0.65 -3.6 -0.2 -1.95 C1.45 -1.95 2.8 -0.6 2.8 1.05 C2.8 3 1.15 4.65 -0.95 4.65 Z"
          fill="rgba(10,10,25,0.75)" stroke="#7000ff" stroke-width="1.05"/>
    <animateMotion dur="9s" repeatCount="indefinite" rotate="0">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </g>

  <g>
    <path d="M-6.8 4.65 C-8.9 4.65 -10.4 3.15 -10.4 1.35 C-10.4 -0.3 -9.2 -1.5 -7.7 -1.8 C-7.4 -3.45 -5.9 -4.65 -3.95 -4.65 C-2.15 -4.65 -0.65 -3.6 -0.2 -1.95 C1.45 -1.95 2.8 -0.6 2.8 1.05 C2.8 3 1.15 4.65 -0.95 4.65 Z"
          fill="rgba(10,10,25,0.75)" stroke="#7000ff" stroke-width="1.05" opacity="0.75"/>
    <animateMotion dur="9s" begin="-4.5s" repeatCount="indefinite" rotate="0">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </g>
</g>

<text x="64" y="26" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#F1F5F9">Athena <tspan fill="#00f0ff">Chronicles</tspan></text>
</svg>
